<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Strength Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="icon" type="image/png" href="assets/image_password_checker.png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
    <script src="script.js" defer></script>
</head>

<body>
    <div class="card">
        <div class="tag">security · zxcvbn</div>
        <h1>Password Strength</h1>
        <p class="subtitle">Analyse en temps réel basée sur zxcvbn par Dropbox.</p>

        <div class="input-wrap">
            <input type="password" id="pwd" placeholder="Entrez un mot de passe…" oninput="checkPassword()"
                autocomplete="off" />
            <div class="icons">
                <button class="toggle-btn" onclick="copy()" title="Copy to clipboard">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
                        xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="7" width="14" height="16" rx="2" ry="2" />
                        <path d="M7 1h10a2 2 0 0 1 2 2v14" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" />
                    </svg>
                </button>
                <button class="toggle-btn" onclick="toggleVis()" title="Afficher / masquer">
                    <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="generator">
            <button class="generator-btn" onclick="toggleGenerator()" id="gen-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
                </svg>
                Générer un mot de passe
            </button>


            <div class="generator-panel" id="gen-panel">
                <div class="gen-option">
                    <label class="gen-label">Longueur</label>
                    <div class="gen-slider-row">
                        <input type="range" id="gen-length" min="8" max="32" value="16"
                            oninput="updateLengthDisplay()" />
                        <span id="gen-length-val" class="gen-value">16</span>
                    </div>
                </div>

                <div class="gen-toggles">
                    <label class="gen-toggle">
                        <input type="checkbox" id="gen-maj" checked />
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        Majuscules
                    </label>
                    <label class="gen-toggle">
                        <input type="checkbox" id="gen-num" checked />
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        Chiffres
                    </label>
                    <label class="gen-toggle">
                        <input type="checkbox" id="gen-sym" checked />
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        Symboles
                    </label>
                </div>

                <button class="gen-submit" onclick="generatePassword()">
                    Générer et tester
                </button>
            </div>
        </div>

        <div id="placeholder" class="placeholder-hint">↑ commencez à taper</div>

        <div id="score-row" class="score-row">
            <span id="score-label" class="score-label">—</span>
            <span id="score-sub" class="score-sub"></span>
        </div>

        <div class="bar-wrap">
            <div id="bar" class="bar-fill"></div>
        </div>

        <div id="stats" class="stats">
            <div class="stat">
                <div class="stat-label">Attaque en ligne</div>
                <div class="stat-value" id="t-online">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">Attaque hors-ligne</div>
                <div class="stat-value" id="t-offline">—</div>
            </div>
        </div>

        <div id="chips" class="chips">
            <span class="chip fail" id="c-len">8+ caractères</span>
            <span class="chip fail" id="c-maj">Majuscule</span>
            <span class="chip fail" id="c-num">Chiffre</span>
            <span class="chip fail" id="c-sym">Symbole</span>
            <span class="chip fail" id="c-long">12+ caractères</span>
        </div>

        <div id="feedback" class="feedback hidden"></div>

        <div class="footer">
            <span class="footer-label">powered by zxcvbn</span>
            <span class="footer-badge">v4.4.2</span>
        </div>
    </div>

    <div id="toast" class="toast">Mot de passe copié !</div>
</body>

</html>
